<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Course Organizer - Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
      <h1 class="logo">
  <span class="logo-icon"></span>
  My Course Organizer
</h1>
       <p class="hero-text">
  Keep track of your university courses easily
</p>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">My Courses</a></li>
            <li><a href="add-course.html" class="active">Add Course</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section class="page-section">
            <h2>Add a New Course</h2>
            <p>Fill in the details below to add a new course to your list.</p>

            <div class="form-container">
            <form>

  <div class="form-group">
    <label for="course-name">Course Name</label>
    <input 
      type="text" 
      id="course-name" 
      name="course-name" 
      placeholder="e.g. Internet Technology" 
      required 
      autofocus
    >
  </div>

  <div class="form-group">
    <label for="course-code">Course Code</label>
    <input 
      type="text" 
      id="course-code" 
      name="course-code" 
      placeholder="e.g. CS301"
      pattern="[A-Za-z0-9]+"
      title="Only letters and numbers"
      required
    >
  </div>

  <div class="form-group">
    <label for="instructor">Instructor Name</label>
    <input 
      type="text" 
      id="instructor" 
      name="instructor" 
      placeholder="e.g. Dr. Aya el-Rahman"
      minlength="3"
      required
    >
  </div>

  <div class="form-group">
    <label for="credit-hours">Credit Hours</label>
    <select id="credit-hours" name="credit-hours" required>
      <option value="">-- Select --</option>
      <option value="1">1 Hour</option>
      <option value="2">2 Hours</option>
      <option value="3">3 Hours</option>
      <option value="4">4 Hours</option>
    </select>
  </div>

  <div class="form-group">
    <label for="notes">Notes</label>
    <textarea 
      id="notes" 
      name="notes" 
      rows="4"
      placeholder="Any notes about this course..."
    ></textarea>
  </div>

  <div class="form-group btn-group">
    <button type="submit" class="btn">Add Course</button>
    <button type="reset" class="btn btn-reset">Clear</button>
  </div>

</form>
